<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Financeiro Pro - v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .modal { display: none; position: fixed; z-index: 50; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 5% auto; padding: 20px; border-radius: 20px; width: 95%; max-height: 90vh; overflow-y: auto; }
        canvas { max-height: 300px; }
    </style>
</head>
<body class="bg-slate-100 p-3 pb-24 text-slate-800">

    <header class="flex justify-between items-center mb-5 bg-white p-4 rounded-2xl shadow-sm">
        <h1 class="font-black text-indigo-900 uppercase tracking-tighter">Gestão DE EMPRESTIMO 💸💸💸💸</h1>
        <div class="text-right">
            <p class="text-[10px] text-gray-400 font-bold uppercase">Investido</p>
            <p id="investido" class="font-black text-indigo-600 text-lg">R$ 0,00</p>
        </div>
    </header>

    <details class="bg-indigo-600 text-white p-4 rounded-2xl shadow-lg mb-6">
        <summary class="font-bold text-sm cursor-pointer list-none flex justify-between items-center uppercase">
            <span>➕ Novo Empréstimo</span>
            <span class="text-xs opacity-70">Abrir</span>
        </summary>
        <div class="space-y-3 mt-4 text-slate-800">
            <input list="listaClientesNomes" id="nome" placeholder="Nome do Cliente" class="w-full p-3 bg-white border rounded-xl outline-none">
            <datalist id="listaClientesNomes"></datalist>
            <div class="flex gap-2">
                <input id="valor" type="number" placeholder="Valor R$" class="w-1/2 p-3 bg-white border rounded-xl">
                <input id="juros" type="number" placeholder="Juros %" class="w-1/2 p-3 bg-white border rounded-xl">
            </div>
            <input id="data" type="date" class="w-full p-3 bg-white border rounded-xl">
            <button onclick="salvarEmprestimo()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black uppercase tracking-widest shadow-xl">Cadastrar</button>
        </div>
    </details>

    <div id="listaEmprestimos" class="space-y-4 mb-8"></div>

    <div class="bg-white p-4 rounded-2xl shadow-md mb-6">
        <h3 class="text-xs font-black text-gray-400 uppercase mb-4 tracking-widest">Lucro Mensal (Juros)</h3>
        <canvas id="graficoLucro"></canvas>
    </div>

    <div id="modalHistorico" class="modal" onclick="fecharModalExterno(event)">
        <div class="modal-content shadow-2xl" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 id="modalNome" class="font-black text-indigo-900 uppercase">Histórico</h2>
                <button onclick="fecharModal()" class="text-red-500 font-bold px-4">X</button>
            </div>
            <div id="corpoHistorico" class="space-y-3"></div>
        </div>
    </div>

    <script>
        // Estrutura de dados com suporte ao gráfico
        let db = JSON.parse(localStorage.getItem('smt_financeiro_v5')) || { 
            ativos: [], 
            lucroAcumulado: 0, 
            historicoGlobal: [],
            lucroPorMes: new Array(12).fill(0) // Array de jan a dez
        };

        let meuGrafico;

        function inicializarGrafico() {
            const ctx = document.getElementById('graficoLucro').getContext('2d');
            meuGrafico = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'],
                    datasets: [{
                        label: 'Lucro R$',
                        data: db.lucroPorMes,
                        backgroundColor: '#4f46e5',
                        borderRadius: 8
                    }]
                },
                options: { 
                    responsive: true,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function salvarEmprestimo() {
            const nome = document.getElementById('nome').value.trim();
            const valor = parseFloat(document.getElementById('valor').value);
            const juros = parseFloat(document.getElementById('juros').value);
            const data = document.getElementById('data').value;

            if(!nome || isNaN(valor) || !data) return alert("Erro: Preencha todos os campos.");

            const novo = {
                id: Date.now(),
                nome, valor, juros, data,
                valorJuro: (valor * (juros / 100))
            };

            db.ativos.push(novo);
            atualizarStorage();
            renderizar();
            document.querySelectorAll('input').forEach(i => i.value = '');
        }

        function darBaixa(id) {
            const index = db.ativos.findIndex(a => a.id === id);
            const emp = db.ativos[index];
            const hoje = new Date();
            const mesAtual = hoje.getMonth(); // 0 a 11

            const opcao = confirm(`BAIXA: ${emp.nome}\n\nOK: Recebeu TUDO (R$ ${(emp.valor + emp.valorJuro).toFixed(2)})\nCANCELAR: Recebeu SÓ JUROS (R$ ${emp.valorJuro.toFixed(2)})`);

            // Registrar lucro no mês atual
            db.lucroPorMes[mesAtual] += emp.valorJuro;

            const registro = {
                nome: emp.nome,
                dataPagamento: hoje.toLocaleDateString('pt-BR'),
                tipo: opcao ? "Quitação Total" : "Apenas Juros",
                valor: opcao ? (emp.valor + emp.valorJuro) : emp.valorJuro,
                status: hoje > new Date(emp.data + 'T00:00:00') ? "ATRASADO ⚠️" : "EM DIA ✅"
            };

            db.historicoGlobal.push(registro);

            if (opcao) {
                db.ativos.splice(index, 1);
            } else {
                let novaData = new Date(emp.data + 'T00:00:00');
                novaData.setMonth(novaData.getMonth() + 1);
                emp.data = novaData.toISOString().split('T')[0];
            }

            atualizarStorage();
            renderizar();
            meuGrafico.update();
        }

        function abrirHistorico(nomeCliente) {
            document.getElementById('modalNome').innerText = nomeCliente;
            const corpo = document.getElementById('corpoHistorico');
            corpo.innerHTML = "";
            const hist = db.historicoGlobal.filter(h => h.nome === nomeCliente).reverse();
            
            hist.forEach(h => {
                corpo.innerHTML += `
                    <div class="p-3 bg-slate-50 rounded-xl border-l-4 ${h.status.includes('DIA') ? 'border-green-500' : 'border-red-500'}">
                        <div class="flex justify-between font-bold text-[10px]"><span>${h.dataPagamento}</span><span>${h.status}</span></div>
                        <p class="text-sm font-black">${h.tipo}</p>
                        <p class="text-xs text-gray-500">Valor: R$ ${h.valor.toFixed(2)}</p>
                    </div>`;
            });
            document.getElementById('modalHistorico').style.display = 'block';
        }

        function fecharModal() { document.getElementById('modalHistorico').style.display = 'none'; }
        function fecharModalExterno(e) { if(e.target.id === 'modalHistorico') fecharModal(); }
        function atualizarStorage() { localStorage.setItem('smt_financeiro_v5', JSON.stringify(db)); }

        function renderizar() {
            const lista = document.getElementById('listaEmprestimos');
            const datalist = document.getElementById('listaClientesNomes');
            lista.innerHTML = ''; datalist.innerHTML = '';
            let somaCapital = 0; let nomesUnicos = new Set();

            db.ativos.sort((a,b) => new Date(a.data) - new Date(b.data)).forEach(emp => {
                nomesUnicos.add(emp.nome);
                somaCapital += emp.valor;
                
                lista.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex justify-between items-center">
                        <div onclick="abrirHistorico('${emp.nome}')">
                            <p class="font-black text-indigo-900 text-sm uppercase underline">${emp.nome}</p>
                            <p class="text-[10px] text-orange-600 font-bold">VENCE: ${emp.data.split('-').reverse().join('/')}</p>
                            <p class="text-[9px] text-gray-400">Capital: R$ ${emp.valor.toFixed(2)}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-slate-700 text-sm mb-2">R$ ${(emp.valor + emp.valorJuro).toFixed(2)}</p>
                            <button onclick="darBaixa(${emp.id})" class="bg-indigo-600 text-white text-[10px] font-bold px-4 py-2 rounded-lg uppercase">Baixa</button>
                        </div>
                    </div>`;
            });

            nomesUnicos.forEach(n => datalist.innerHTML += `<option value="${n}">`);
            document.getElementById('investido').innerText = `R$ ${somaCapital.toFixed(2)}`;
        }

        renderizar();
        inicializarGrafico();
    </script>
</body>
</html>
