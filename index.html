<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Financeiro - Valor Fixo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 5% auto; padding: 20px; border-radius: 20px; width: 95%; max-height: 90vh; overflow-y: auto; }
        .btn-acao { transition: transform 0.1s; }
        .btn-acao:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-slate-100 p-3 pb-24 text-slate-800">

    <header class="flex justify-between items-center mb-5 bg-white p-4 rounded-2xl shadow-sm border-b-2 border-indigo-100">
        <div>
            <h1 class="font-black text-indigo-900 uppercase tracking-tighter leading-none">GESTÃO FINANCEIRA</h1>
            <p class="text-[9px] font-bold text-slate-400 uppercase">SMT Especialista</p>
        </div>
        <button onclick="abrirListaClientes()" class="bg-indigo-100 text-indigo-700 p-2 rounded-xl text-[10px] font-black uppercase">Meus Clientes</button>
    </header>

    <div class="grid grid-cols-1 gap-2 mb-4">
        <div class="bg-indigo-600 p-4 rounded-2xl text-white shadow-lg">
            <p class="text-[10px] opacity-70 uppercase font-bold tracking-widest">Capital Investido (na rua)</p>
            <p id="investido" class="text-3xl font-black">R$ 0,00</p>
        </div>
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm mb-6 border border-slate-200">
        <h2 class="font-black text-slate-700 text-xs mb-4 uppercase tracking-widest italic text-indigo-600">➕ Novo Empréstimo</h2>
        <div class="space-y-3">
            <input list="listaClientesNomes" id="nome" placeholder="Nome do Cliente" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl outline-none focus:border-indigo-500 font-bold">
            <datalist id="listaClientesNomes"></datalist>
            
            <div class="flex gap-2">
                <div class="w-1/2">
                    <label class="text-[9px] font-black text-slate-400 ml-2 uppercase">Capital R$</label>
                    <input id="valor" type="number" placeholder="Ex: 1000" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold">
                </div>
                <div class="w-1/2">
                    <label class="text-[9px] font-black text-slate-400 ml-2 uppercase">Juro R$</label>
                    <input id="jurosValor" type="number" placeholder="Ex: 100" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold text-green-600">
                </div>
            </div>
            
            <div class="flex flex-col">
                <label class="text-[9px] font-black text-slate-400 ml-2 mb-1 uppercase">Data de Vencimento</label>
                <input id="data" type="date" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-xl font-bold">
            </div>
            
            <button onclick="salvarEmprestimo()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black uppercase shadow-lg btn-acao tracking-wider">Cadastrar</button>
        </div>
    </div>

    <h3 class="text-[10px] font-black text-slate-400 uppercase mb-3 ml-2 tracking-widest">Cobranças em Aberto</h3>
    <div id="listaEmprestimos" class="space-y-4 mb-8"></div>

    <div class="bg-white p-5 rounded-2xl shadow-sm mb-6 border border-slate-200">
        <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest text-center">Lucro Mensal (Total de Juros)</h3>
        <canvas id="graficoLucro"></canvas>
    </div>

    <div id="modalGeral" class="modal" onclick="fecharModalExterno(event)">
        <div class="modal-content shadow-2xl" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4 border-b pb-3">
                <h2 id="modalTitulo" class="font-black text-indigo-900 uppercase text-sm">Ação</h2>
                <button onclick="fecharModal()" class="bg-slate-100 p-2 rounded-full px-4 text-red-500 font-black">X</button>
            </div>
            <div id="corpoModal" class="space-y-4"></div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('smt_v7_valor')) || { 
            ativos: [], 
            historicoGlobal: [],
            clientes: [], 
            lucroPorMes: new Array(12).fill(0) 
        };

        let meuGrafico;

        function inicializarGrafico() {
            const ctx = document.getElementById('graficoLucro').getContext('2d');
            meuGrafico = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'],
                    datasets: [{
                        label: 'Lucro R$',
                        data: db.lucroPorMes,
                        backgroundColor: '#4f46e5',
                        borderRadius: 8
                    }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true } } }
            });
        }

        function salvarEmprestimo() {
            const nome = document.getElementById('nome').value.trim();
            const valor = parseFloat(document.getElementById('valor').value);
            const juroFixo = parseFloat(document.getElementById('jurosValor').value);
            const data = document.getElementById('data').value;

            if(!nome || isNaN(valor) || isNaN(juroFixo) || !data) return alert("Preencha todos os campos!");

            const novo = { 
                id: Date.now(), 
                nome, 
                valor, 
                valorJuro: juroFixo, // Salva o valor direto, sem %
                data 
            };

            db.ativos.push(novo);
            if(!db.clientes.includes(nome)) db.clientes.push(nome);
            atualizarStorage();
            renderizar();
            document.querySelectorAll('input').forEach(i => i.value = '');
        }

        function abrirModalBaixa(id) {
            const emp = db.ativos.find(a => a.id === id);
            const hoje = new Date().toISOString().split('T')[0];
            document.getElementById('modalTitulo').innerText = "Baixa: " + emp.nome;
            const corpo = document.getElementById('corpoModal');
            
            corpo.innerHTML = `
                <div class="space-y-4">
                    <div class="bg-slate-50 p-4 rounded-xl border border-indigo-100">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Resumo Financeiro</p>
                        <p class="font-bold text-slate-700">Capital: R$ ${emp.valor.toFixed(2)}</p>
                        <p class="font-bold text-green-600">Juro Fixo: R$ ${emp.valorJuro.toFixed(2)}</p>
                        <p class="text-xl font-black text-indigo-900 mt-2 border-t pt-2">Total: R$ ${(emp.valor + emp.valorJuro).toFixed(2)}</p>
                    </div>

                    <div class="flex flex-col">
                        <label class="text-[10px] font-black text-slate-400 mb-1 ml-1 uppercase">Data do Recebimento</label>
                        <input id="dataRecebimento" type="date" value="${hoje}" class="p-4 bg-slate-50 border-2 border-slate-200 rounded-xl font-bold outline-none focus:border-indigo-500">
                    </div>

                    <div class="grid grid-cols-1 gap-3 pt-2">
                        <button onclick="processarBaixa(${id}, 'TOTAL')" class="bg-green-600 text-white py-4 rounded-xl font-black uppercase shadow-md active:scale-95">Receber Capital + Juros</button>
                        <button onclick="processarBaixa(${id}, 'JUROS')" class="bg-indigo-600 text-white py-4 rounded-xl font-black uppercase shadow-md active:scale-95">Receber Só Juros (Renovar)</button>
                        <button onclick="fecharModal()" class="bg-slate-200 text-slate-500 py-4 rounded-xl font-black uppercase active:scale-95 text-xs">❌ Cancelar Operação</button>
                    </div>
                </div>`;
            document.getElementById('modalGeral').style.display = 'block';
        }

        function processarBaixa(id, tipo) {
            const index = db.ativos.findIndex(a => a.id === id);
            const emp = db.ativos[index];
            const dataInf = document.getElementById('dataRecebimento').value;
            if(!dataInf) return alert("Informe a data!");

            const dObj = new Date(dataInf + 'T00:00:00');
            const mes = dObj.getMonth();

            db.lucroPorMes[mes] += emp.valorJuro;

            const registro = {
                nome: emp.nome,
                data: dObj.toLocaleDateString('pt-BR'),
                tipo: tipo === 'TOTAL' ? "Recebeu Tudo" : "Só Juros (Renovado)",
                valor: tipo === 'TOTAL' ? (emp.valor + emp.valorJuro) : emp.valorJuro,
                status: dObj > new Date(emp.data + 'T00:00:00') ? "ATRASADO ⚠️" : "EM DIA ✅"
            };

            db.historicoGlobal.push(registro);

            if (tipo === 'TOTAL') {
                db.ativos.splice(index, 1);
            } else {
                let d = new Date(emp.data + 'T00:00:00');
                d.setMonth(d.getMonth() + 1);
                emp.data = d.toISOString().split('T')[0];
            }

            atualizarStorage();
            renderizar();
            meuGrafico.update();
            fecharModal();
        }

        function abrirListaClientes() {
            document.getElementById('modalTitulo').innerText = "Meus Clientes";
            const corpo = document.getElementById('corpoModal');
            corpo.innerHTML = db.clientes.length === 0 ? "Vazio." : "";
            db.clientes.sort().forEach(n => {
                corpo.innerHTML += `
                    <div class="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-200">
                        <p class="font-black text-slate-700 uppercase text-xs">${n}</p>
                        <div class="flex gap-1">
                            <button onclick="selecionarCliente('${n}')" class="bg-indigo-600 text-white text-[9px] font-black px-3 py-2 rounded-lg uppercase">Usar</button>
                            <button onclick="verHistorico('${n}')" class="bg-slate-200 text-slate-600 text-[9px] font-black px-3 py-2 rounded-lg uppercase">Ver</button>
                        </div>
                    </div>`;
            });
            document.getElementById('modalGeral').style.display = 'block';
        }

        function selecionarCliente(n) { document.getElementById('nome').value = n; fecharModal(); }

        function verHistorico(n) {
            document.getElementById('modalTitulo').innerText = "Histórico: " + n;
            const corpo = document.getElementById('corpoModal');
            corpo.innerHTML = "";
            const hist = db.historicoGlobal.filter(h => h.nome === n).reverse();
            if(hist.length === 0) corpo.innerHTML = "Sem registros.";
            hist.forEach(h => {
                corpo.innerHTML += `
                    <div class="p-3 bg-slate-50 rounded-xl border-l-4 ${h.status.includes('DIA') ? 'border-green-500' : 'border-red-500'}">
                        <div class="flex justify-between text-[10px] font-bold uppercase"><span>${h.data}</span><span>${h.status}</span></div>
                        <p class="text-sm font-black">${h.tipo}</p>
                        <p class="text-xs text-slate-500 font-bold">Valor: R$ ${h.valor.toFixed(2)}</p>
                    </div>`;
            });
            document.getElementById('modalGeral').style.display = 'block';
        }

        function fecharModal() { document.getElementById('modalGeral').style.display = 'none'; }
        function fecharModalExterno(e) { if(e.target.id === 'modalGeral') fecharModal(); }
        function atualizarStorage() { localStorage.setItem('smt_v7_valor', JSON.stringify(db)); }

        function renderizar() {
            const lista = document.getElementById('listaEmprestimos');
            const datalist = document.getElementById('listaClientesNomes');
            lista.innerHTML = ''; datalist.innerHTML = '';
            let somaCap = 0;
            db.ativos.sort((a,b) => new Date(a.data) - new Date(b.data)).forEach(emp => {
                somaCap += emp.valor;
                lista.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                        <div class="flex justify-between items-start">
                            <div onclick="verHistorico('${emp.nome}')">
                                <p class="font-black text-indigo-900 uppercase underline text-sm tracking-tighter">${emp.nome}</p>
                                <p class="text-[10px] text-orange-600 font-black mt-1 uppercase italic">📅 Vence: ${emp.data.split('-').reverse().join('/')}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] font-bold text-slate-400 uppercase">Total a Receber</p>
                                <p class="font-black text-slate-700">R$ ${(emp.valor + emp.valorJuro).toFixed(2)}</p>
                            </div>
                        </div>
                        <div class="flex justify-between items-center mt-4 pt-3 border-t border-slate-50">
                            <p class="text-[10px] font-bold text-slate-400">Cap: R$ ${emp.valor.toFixed(2)} + Juro: R$ ${emp.valorJuro.toFixed(2)}</p>
                            <button onclick="abrirModalBaixa(${emp.id})" class="bg-green-600 text-white text-[10px] font-black px-6 py-3 rounded-xl uppercase btn-acao shadow-md">Dar Baixa</button>
                        </div>
                    </div>`;
            });
            db.clientes.forEach(n => datalist.innerHTML += `<option value="${n}">`);
            document.getElementById('investido').innerText = `R$ ${somaCap.toFixed(2)}`;
        }

        renderizar();
        inicializarGrafico();
    </script>
</body>
</html>
